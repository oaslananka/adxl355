name: Release Gate

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release tag to verify (for example v0.1.0-alpha.2)"
        required: true
        type: string

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}

jobs:
  ci:
    name: Required CI
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  preflight:
    name: Tag, commit, and version preflight
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.preflight.outputs.tag }}
      version: ${{ steps.preflight.outputs.version }}
      python_version: ${{ steps.preflight.outputs.python_version }}
      core_version: ${{ steps.preflight.outputs.core_version }}
      go_tag: ${{ steps.preflight.outputs.go_tag }}
      rust_crate_name: ${{ steps.preflight.outputs.rust_crate_name }}
      node_package_name: ${{ steps.preflight.outputs.node_package_name }}
      release_sha: ${{ steps.preflight.outputs.release_sha }}
      short_sha: ${{ steps.preflight.outputs.short_sha }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Test release preflight fixture
        run: python -m unittest discover -s scripts/tests -p "test_release_preflight.py" -v
      - name: Verify tag, commit, clean tree, and package versions
        id: preflight
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          report="$RUNNER_TEMP/release-preflight.json"
          python scripts/release_preflight.py \
            --tag "$RELEASE_TAG" \
            --sha "$RELEASE_SHA" > "$report"
          jq -r '
            {tag, version, python_version, core_version, go_tag, rust_crate_name, node_package_name, release_sha, short_sha}
            | to_entries[]
            | "\(.key)=\(.value)"
          ' "$report" >> "$GITHUB_OUTPUT"
          cat "$report"

  python-package:
    name: Python package dry run
    permissions:
      contents: read
    needs: [ci, preflight]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Verify exact clean checkout
        env:
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Build wheel and source distribution
        env:
          OUT: ${{ runner.temp }}/release/python
          PYTHON_VERSION: ${{ needs.preflight.outputs.python_version }}
        run: |
          mkdir -p "$OUT"
          python -m pip install --disable-pip-version-check "build==1.5.0"
          python -m build python --outdir "$OUT"
          (
            cd "$OUT"
            for artifact in ./*.whl ./*.tar.gz; do
              printf '## %s\n' "$artifact"
              case "$artifact" in
                *.whl) python -m zipfile -l "$artifact" ;;
                *.tar.gz) tar -tzf "$artifact" ;;
              esac
            done
          ) > "$OUT/CONTENTS.txt"
          (cd "$OUT" && sha256sum -- ./*.whl ./*.tar.gz > SHA256SUMS)
          python scripts/release_artifacts.py python \
            --directory "$OUT" \
            --version "$PYTHON_VERSION" > "$OUT/VERIFY.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-python-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}
          path: ${{ runner.temp }}/release/python/*
          if-no-files-found: error
          retention-days: 14

  rust-package:
    name: Rust crate dry run
    permissions:
      contents: read
    needs: [ci, preflight]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
      - name: Verify exact clean checkout
        env:
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Build crate without publishing
        env:
          OUT: ${{ runner.temp }}/release/rust
          VERSION: ${{ needs.preflight.outputs.version }}
        working-directory: rust
        run: |
          mkdir -p "$OUT"
          cargo package --locked
          cargo package --list > "$OUT/CONTENTS.txt"
          cp "target/package/adxl355-driver-${VERSION}.crate" "$OUT/"
          (cd "$OUT" && sha256sum -- ./*.crate > SHA256SUMS)
          python3 ../scripts/release_artifacts.py rust \
            --directory "$OUT" \
            --version "$VERSION" > "$OUT/VERIFY.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-rust-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}
          path: ${{ runner.temp }}/release/rust/*
          if-no-files-found: error
          retention-days: 14

  node-package:
    name: Node.js tarball dry run
    permissions:
      contents: read
    needs: [ci, preflight]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - name: Verify exact clean checkout
        env:
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Build and pack without publishing
        env:
          OUT: ${{ runner.temp }}/release/node
        working-directory: node
        run: |
          mkdir -p "$OUT"
          npm ci --ignore-scripts
          npm run build
          npm pack --dry-run --json > "$OUT/PACK_CONTENTS.json"
          npm pack --pack-destination "$OUT"
          (cd "$OUT" && sha256sum -- ./*.tgz > SHA256SUMS)
          python3 ../scripts/release_artifacts.py node \
            --directory "$OUT" \
            --version "${{ needs.preflight.outputs.version }}" > "$OUT/VERIFY.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-node-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}
          path: ${{ runner.temp }}/release/node/*
          if-no-files-found: error
          retention-days: 14

  go-package:
    name: Go module dry run
    permissions:
      contents: read
    needs: [ci, preflight]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.21"
          cache: false
      - name: Verify exact clean checkout
        env:
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Verify and archive module without publishing
        env:
          OUT: ${{ runner.temp }}/release/go
          VERSION: ${{ needs.preflight.outputs.version }}
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          mkdir -p "$OUT"
          (cd go && go mod verify && go test ./... && go vet ./... && go build ./...)
          git archive \
            --format=tar.gz \
            --prefix="adxl355-go-${VERSION}/" \
            --output="$OUT/adxl355-go-${VERSION}.tar.gz" \
            "${RELEASE_SHA}:go"
          git show -s --format='commit=%H%ncommitted_at=%cI' "$RELEASE_SHA" > "$OUT/BUILD_INFO.txt"
          (cd "$OUT" && sha256sum -- ./*.tar.gz > SHA256SUMS)
          python3 scripts/release_artifacts.py go \
            --directory "$OUT" \
            --version "$VERSION" > "$OUT/VERIFY.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-go-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}
          path: ${{ runner.temp }}/release/go/*
          if-no-files-found: error
          retention-days: 14

  c-cpp-package:
    name: C and C++ artifacts dry run
    permissions:
      contents: read
    needs: [ci, preflight]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          persist-credentials: false
      - name: Install C/C++ build tools
        run: sudo apt-get update && sudo apt-get install -y cmake gcc g++
      - name: Verify exact clean checkout
        env:
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
          test -z "$(git status --porcelain --untracked-files=all)"
      - name: Build and stage C/C++ artifacts
        env:
          OUT: ${{ runner.temp }}/release/c-cpp
          VERSION: ${{ needs.preflight.outputs.version }}
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
        run: |
          cmake -S c -B c/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DADXL355_BUILD_TESTS=ON \
            -DADXL355_BUILD_EXAMPLES=ON \
            -DADXL355_WARNINGS_AS_ERRORS=ON
          cmake --build c/build --parallel 2
          ctest --test-dir c/build --output-on-failure

          cmake -S cpp -B cpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DADXL355_BUILD_TESTS=ON \
            -DADXL355_BUILD_EXAMPLES=ON \
            -DCMAKE_CXX_FLAGS='-Wall -Wextra -Wpedantic -Werror'
          cmake --build cpp/build --parallel 2
          ctest --test-dir cpp/build --output-on-failure

          STAGE="$RUNNER_TEMP/release/c-cpp-stage"
          mkdir -p "$OUT" "$STAGE/include/adxl355-cpp" "$STAGE/bin" "$STAGE/lib"
          cmake --install c/build --prefix "$STAGE"
          cp cpp/include/adxl355/adxl355.hpp "$STAGE/include/adxl355-cpp/adxl355.hpp"
          cp c/build/libadxl355.a "$STAGE/lib/"
          cp c/build/examples/basic_read "$STAGE/bin/adxl355-c-basic-read"
          cp cpp/build/examples/basic_read "$STAGE/bin/adxl355-cpp-basic-read"
          printf 'version=%s\ncommit=%s\n' "$VERSION" "$RELEASE_SHA" > "$STAGE/BUILD_INFO.txt"
          tar -C "$STAGE" -czf "$OUT/adxl355-c-cpp-${VERSION}.tar.gz" .
          find "$STAGE" -type f -printf '%P\n' | sort > "$OUT/CONTENTS.txt"
          (cd "$OUT" && sha256sum -- ./*.tar.gz > SHA256SUMS)
          python3 scripts/release_artifacts.py native \
            --directory "$OUT" \
            --version "$VERSION" > "$OUT/VERIFY.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-c-cpp-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}
          path: ${{ runner.temp }}/release/c-cpp/*
          if-no-files-found: error
          retention-days: 14

  release-bundle:
    name: Aggregate, scan, and attest release artifacts
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    needs:
      - preflight
      - python-package
      - rust-package
      - node-package
      - go-package
      - c-cpp-package
    runs-on: ubuntu-24.04
    steps:
      - name: Check out release tooling
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.preflight.outputs.release_sha }}
          persist-credentials: false

      - name: Download verified package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: package-*-${{ needs.preflight.outputs.short_sha }}
          path: ${{ runner.temp }}/release-artifacts

      - name: Create aggregate metadata and checksums
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
          RELEASE_SHA: ${{ needs.preflight.outputs.release_sha }}
          SHORT_SHA: ${{ needs.preflight.outputs.short_sha }}
          ROOT: ${{ runner.temp }}
        run: |
          cd "$ROOT"
          find release-artifacts -type f -print0 | sort -z | xargs -0 sha256sum > RELEASE_SHA256SUMS
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = {
              "tag": os.environ["RELEASE_TAG"],
              "version": os.environ["VERSION"],
              "python_version": "${{ needs.preflight.outputs.python_version }}",
              "go_tag": "${{ needs.preflight.outputs.go_tag }}",
              "rust_crate_name": "${{ needs.preflight.outputs.rust_crate_name }}",
              "node_package_name": "${{ needs.preflight.outputs.node_package_name }}",
              "release_sha": os.environ["RELEASE_SHA"],
              "short_sha": os.environ["SHORT_SHA"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "repository": os.environ["GITHUB_REPOSITORY"],
              "publishing_enabled": False,
              "registry_authentication": "oidc-only-when-enabled",
          }
          Path(os.environ["ROOT"], "release-metadata.json").write_text(
              json.dumps(metadata, indent=2) + "\n"
          )
          PY

      - name: Prepare package contents for SBOM scanning
        run: |
          python scripts/prepare_sbom_input.py \
            --artifacts-root "${{ runner.temp }}/release-artifacts" \
            --output "${{ runner.temp }}/sbom-input" \
            > "${{ runner.temp }}/SBOM_PREPARE.json"
          cp "${{ runner.temp }}/sbom-input/SBOM_INPUT.json" \
            "${{ runner.temp }}/SBOM_INPUT.json"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ${{ runner.temp }}/sbom-input
          format: spdx-json
          output-file: ${{ runner.temp }}/release.syft.spdx.json
          syft-version: v1.49.0
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Finalize release artifact inventory
        run: |
          python scripts/finalize_release_sbom.py \
            --syft-sbom "${{ runner.temp }}/release.syft.spdx.json" \
            --manifest "${{ runner.temp }}/SBOM_INPUT.json" \
            --output "${{ runner.temp }}/release.spdx.json" \
            > "${{ runner.temp }}/SBOM_FINALIZE.json"

      - name: Block high-severity release vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: ${{ runner.temp }}/release.spdx.json
          fail-build: true
          severity-cutoff: high
          only-fixed: false
          output-format: json
          output-file: ${{ runner.temp }}/release-vulnerabilities.json
          grype-version: v0.116.0

      - name: Create attestable release bundle
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          SHORT_SHA: ${{ needs.preflight.outputs.short_sha }}
          ROOT: ${{ runner.temp }}
        run: |
          cd "$ROOT"
          bundle="adxl355-release-${VERSION}-${SHORT_SHA}.tar.gz"
          tar -czf "$bundle"             release-artifacts             RELEASE_SHA256SUMS             release-metadata.json             release.spdx.json             release-vulnerabilities.json
          sha256sum -- "$bundle" > RELEASE_BUNDLE_SHA256SUMS

      - name: Attest SLSA build provenance
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ runner.temp }}/adxl355-release-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}.tar.gz

      - name: Attest release SBOM
        id: sbom-attestation
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ runner.temp }}/adxl355-release-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}.tar.gz
          sbom-path: ${{ runner.temp }}/release.spdx.json

      - name: Upload release evidence bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-bundle-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}
          path: |
            ${{ runner.temp }}/release-artifacts
            ${{ runner.temp }}/RELEASE_SHA256SUMS
            ${{ runner.temp }}/RELEASE_BUNDLE_SHA256SUMS
            ${{ runner.temp }}/release-metadata.json
            ${{ runner.temp }}/SBOM_INPUT.json
            ${{ runner.temp }}/SBOM_PREPARE.json
            ${{ runner.temp }}/SBOM_FINALIZE.json
            ${{ runner.temp }}/release.syft.spdx.json
            ${{ runner.temp }}/release.spdx.json
            ${{ runner.temp }}/release-vulnerabilities.json
            ${{ runner.temp }}/adxl355-release-${{ needs.preflight.outputs.version }}-${{ needs.preflight.outputs.short_sha }}.tar.gz
            ${{ steps.provenance.outputs.bundle-path }}
            ${{ steps.sbom-attestation.outputs.bundle-path }}
          if-no-files-found: error
          retention-days: 14
